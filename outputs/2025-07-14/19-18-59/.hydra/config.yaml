data:
  _target_: data.navier_stokes.NSDataModule
  name: navier_stokes
  data_dir: ${oc.env:PROJECT_ROOT}/data/_data/navier_stokes/
  filename: fno_ns_Re20_N5000_T50.npy
  batch_size: 256
  n_tr: 4000
  n_te: 1000
model:
  _target_: models.fno.FNO
  modes: 64
  vis_channels: 1
  hidden_channels: 64
  proj_channels: 64
  x_dim: 2
  t_scaling: 1000
trainer:
  _target_: training.trainer.Trainer
  model: ${model}
  n_epochs: 10
  wandb_log: ${wandb.use_wandb}
  device: cuda
  mixed_precision: false
  pre_train_processor: pre_train.ffm
  eval_interval: 5
  log_output: true
  use_distributed: false
  verbose: true
  config:
    loss: loss.mse
    optimizer: optimizer.adam
    scheduler: scheduler.step_lr
    save_every: 10
    save_path: ${hydra.run.dir}/checkpoints
wandb:
  use_wandb: false
