_target_: models.fno.FNO

name: fno
modes: 64
# ``vis_channels`` / ``out_channels`` are set at runtime from the first preprocessed batch (``train.py``).
hidden_channels: 64
proj_channels: 64
x_dim: 2
t_scaling: 1
coord_channels: 0
film_param_dim: ${conditioning.param_dim}
