# @package _global_
# Conditioning + FiLM smoke / seed sweep on NS with synthetic constant Re, nu.
# Run: ``python train.py --config-path configs --config-name experiment/phase2 --multirun``
defaults:
  - /train
  - /conditioning/level2
  - _self_

model:
  coord_channels: 2
  film_param_dim: ${conditioning.param_dim}

data:
  default_param_vector: [20.0, 0.001]

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      seed: 0,1,2
