experiment_name: trial
data:
  _target_: data.navier_stokes.NSDataModule
  name: navier_stokes
  data_dir: ${oc.env:PROJECT_ROOT}/data/_data/navier_stokes/
  filename: fno_ns_Re20_N5000_T50.npy
  batch_size: 256
  n_tr: 4000
  n_te: 1000
model:
  _target_: models.fno.FNO
  name: fno
  modes: 64
  vis_channels: 1
  hidden_channels: 64
  proj_channels: 64
  x_dim: 2
  t_scaling: 1000
trainer:
  _target_: training.trainer.Trainer
  model: ${model}
  n_epochs: 10
  wandb_log: ${wandb.use_wandb}
  device: cuda
  mixed_precision: false
  eval_interval: 5
  log_output: true
  use_distributed: false
  verbose: true
  save_every: 10
  save_path: ${hydra:run.dir}/checkpoints
  optimizer:
    _target_: torch.optim.Adam
    _partial_: true
    lr: 0.0001
  scheduler:
    _target_: torch.optim.lr_scheduler.StepLR
    _partial_: true
    step_size: 25
  pre_train_processor:
    _target_: training.data_processors.FlowMatchingDataProcessor
    kernel_length: 0.001
    kernel_variance: 1.0
    vp: false
    sigma_min: 0.0001
    device: cuda
  loss:
    _target_: torch.nn.MSELoss
wandb:
  use_wandb: false
