defaults:
  - _self_
  - paradigm: fm
  - data: navier_stokes
  - model: fno
  - train: debug
  - wandb: disabled

seed: 42

# Override on CLI, e.g. ``evaluate.checkpoint_dir=/path/to/.../checkpoints``
evaluate:
  # Prefer ``CHECKPOINT_DIR`` or CLI override; default is cwd-relative.
  checkpoint_dir: ${oc.env:CHECKPOINT_DIR,./checkpoints}
  device: cuda
  n_rollout_steps: 50
  sampler_type: euler
  ode_steps: 16
  ddim_steps: 20

hydra:
  run:
    dir: evaluation_runs/${model.name}-${paradigm.name}-${now:%Y-%m-%d_%H-%M-%S}
