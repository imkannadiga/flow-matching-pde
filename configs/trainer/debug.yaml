_target_: training.trainer.Trainer

model: ${model}
n_epochs: 10
wandb_log: ${wandb.use_wandb}
device: "cuda"
mixed_precision: False
gradient_accumulation_steps: 1
eval_interval: 5
log_output: True
use_distributed: False
verbose: True

save_every: 10
save_path: ${hydra:run.dir}/checkpoints

optimizer:
  _target_: torch.optim.Adam
  _partial_: true
  lr: 1e-4
scheduler:
  _target_: torch.optim.lr_scheduler.StepLR
  _partial_: true

  step_size: 25

pre_train_processor:
  _target_: training.data_processors.FlowMatchingProcessor
  device: ${trainer.device}
  append_coords: false
  film_params: false
  coord_normalize: neg1_1
  tau_num_points: 20

loss:
  _target_: torch.nn.MSELoss
  reduction: sum

