enabled: true

# Runtime policy
mixed_precision: "no" # one of: no, fp16, bf16
cpu: false
log_with: null
project_dir: ${hydra:run.dir}

# Optional compile/dynamo integration
dynamo_backend: null

# Distributed topology (used by launcher/orchestration)
num_processes: 1
num_machines: 1
machine_rank: 0
node_id: ${accelerate.machine_rank}
main_process_ip: "127.0.0.1"
main_process_port: 29500
