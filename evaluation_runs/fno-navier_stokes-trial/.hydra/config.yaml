experiment_name: trial
data:
  _target_: data.navier_stokes.NSDataModule
  name: navier_stokes
  data_dir: ${oc.env:PROJECT_ROOT}/data/_data/navier_stokes/
  filename: fno_ns_Re20_N5000_T50.npy
  batch_size: 256
  n_tr: 4000
  n_te: 1000
model:
  _target_: models.fno.FNO
  name: fno
  modes: 64
  vis_channels: 1
  hidden_channels: 64
  proj_channels: 64
  x_dim: 2
  t_scaling: 1000
eval:
  _target_: evaluation.simulation_eval.SimulationEvaluator
  model: ${model}
  data: ${data}
  state_dict_path: training_runs/${model.name}-${data.name}-${experiment_name}/checkpoints
  device: cuda
  n_samples: 1000
  n_steps: 50
  save_path: ${hydra:run.dir}/results
