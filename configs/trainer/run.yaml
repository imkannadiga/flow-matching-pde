_target_: training.trainer.Trainer

model: ${model}
n_epochs: 300
wandb_log: ${wandb.use_wandb}
device: "cuda"
mixed_precision: False
# Effective update batch ≈ batch_size × this (same loss reduction as one large batch with sum loss).
gradient_accumulation_steps: 1
eval_interval: 10
log_output: True
use_distributed: False
verbose: True

save_every: 20
save_path: ${hydra:run.dir}/checkpoints

optimizer:
  _target_: torch.optim.Adam
  _partial_: true
  lr: 1e-4

scheduler:
  _target_: torch.optim.lr_scheduler.StepLR
  _partial_: true
  step_size: 25

pre_train_processor:
  _target_: training.data_processors.FlowMatchingProcessor
  device: ${trainer.device}
  append_coords: false
  film_params: false
  coord_normalize: neg1_1

loss:
  _target_: torch.nn.MSELoss
  reduction: sum

