data:
  root_dir: ./data/
  filename: fno_ns_Re20_N5000_T50.npy
  n_tr: 20000
  batch_size: 256
model:
  modes: 64
  visch: 1
  hch: 64
  pch: 64
  xdim: 2
  t_scaling: 1000
  input_dim: 2
  hidden_dim: 64
  lengthscale: 0.001
  var: 1.0
  sigma_min: 0.0001
  device: cuda
train:
  lr: 0.0001
  epochs: 10
  eval_int: 10
  save_int: 10
  scheduler_step_size: 25
  scheduler_gamma: 0.5
  generate: false
  save_path: ./results/
  checkpoint_dir: ./checkpoints
wandb:
  project: FunctionalFlowMatching
  name: FFM - Navier Stokes
  model: FFM-FNO
  entity: hathreyap-university-of-stuttgart
  enabled: true
